name: install

env:
  # 版本控制：
  # - 设置 VERSION 为空字符串时，下载 latest 版本
  # - 设置 VERSION 为具体版本号时（如 v1.2.3），下载指定版本
  MAAFW_VERSION: ""
  MFAA_VERSION: ""

on:
  push:
    tags:
      - "v*"
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - ".github/workflows/check.yml"
      - "README.md"
      - "assets/**"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/install.yml"
      - ".github/workflows/check.yml"
      - "README.md"
      - "assets/**"
      - "**.py"
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if [[ "$is_release" != "true" ]]; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: windows-latest
    strategy:
      matrix:
        os: [win]
        arch: [x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: ${{ env.MAAFW_VERSION == '' }}
          tag: ${{ env.MAAFW_VERSION }}
          out-file-path: "deps"
          extract: true

      - name: Download MFAAvalonia
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: SweetSmellFox/MFAAvalonia
          fileName: "MFAAvalonia-*-${{ (matrix.os == 'win' && 'win') || (matrix.os == 'macos' && 'osx') || (matrix.os == 'linux' && 'linux') }}-${{ (matrix.arch == 'x86_64' && 'x64') || (matrix.arch == 'aarch64' && 'arm64') }}*"
          latest: ${{ env.MFAA_VERSION == '' }}
          tag: ${{ env.MFAA_VERSION }}
          out-file-path: "MFA"
          extract: true

      - name: Clean up MFAAvalonia archive
        if: matrix.os != 'android'
        shell: pwsh
        run: |
          $files = '${{ steps.download_mfa.outputs.downloaded_files }}' | ConvertFrom-Json
          Remove-Item -LiteralPath $files[0] -Force
          Write-Host "Archive cleanup command executed for MFAAvalonia."

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: pwsh
        run: |
          Remove-Item -LiteralPath MFA/runtimes -Recurse -Force -ErrorAction SilentlyContinue
      
      - name: Install
        shell: pwsh
        run: |
          if ("${{ matrix.os }}" -ne "android") {
            if (Test-Path MFA) {
              Write-Host "Copying MFA files to install directory..."
              New-Item -ItemType Directory -Force install | Out-Null
              Copy-Item -Path MFA/* -Destination install -Recurse -Force
              Write-Host "MFA files copied successfully."
            } else {
              Write-Host "MFA directory not found, skipping copy."
            }
          } else {
            Write-Host "Skipping copy MFA for Android."
          }

          Push-Location tools
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          Pop-Location

      - name: Bundle Python runtime and agent dependencies
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: pwsh
        run: |
          $pythonVersion = "3.11.9"
          $pythonTag = "311"
          $pythonDir = "install/python"
          $pythonZip = "python-embed.zip"
          $pythonUrl = "https://www.python.org/ftp/python/$pythonVersion/python-$pythonVersion-embed-amd64.zip"
          $getPipUrl = "https://bootstrap.pypa.io/get-pip.py"

          Invoke-WebRequest -Uri $pythonUrl -OutFile $pythonZip
          Expand-Archive -Path $pythonZip -DestinationPath $pythonDir -Force

          $pthFile = Join-Path $pythonDir "python$pythonTag._pth"
          (Get-Content $pthFile) -replace "#import site", "import site" | Set-Content $pthFile -Encoding ASCII

          Invoke-WebRequest -Uri $getPipUrl -OutFile "get-pip.py"
          & "$pythonDir/python.exe" "get-pip.py" --no-warn-script-location
          & "$pythonDir/python.exe" -m pip install --no-warn-script-location --upgrade -r "agent/requirements.txt"
          & "$pythonDir/python.exe" -c "import maa, numpy; print('bundled python ok')"

      - uses: actions/upload-artifact@v4
        with:
          name: MaaLK-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done
          
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

        # Mirror酱为第三方分发服务，新项目默认关闭
        # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
        # https://mirrorchyan.com/
      - name: Trigger MirrorChyanUploading
        if: false
        # if: ${{ github.repository_owner == 'MaaXYZ' }}
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
